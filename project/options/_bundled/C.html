document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rder-color:var(--sage-d)}\n  .btn.sage:hover{background:transparent;color:var(--sage-d)}\n\n  .eyebrow{font-family:'Cormorant',serif;font-weight:600;letter-spacing:.28em;text-transform:uppercase;font-size:13px;color:var(--terra)}\n\n  /* nav */\n  header.nav{position:sticky;top:0;z-index:50;background:rgba(245,241,232,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}\n  .nav-in{display:flex;align-items:center;justify-content:space-between;height:78px}\n  .logo{font-family:'Gowun Batang';font-size:18px;letter-spacing:.02em}\n  .logo .of{color:var(--terra);font-weight:600}\n  .nav-links{display:flex;gap:34px;font-size:13px;letter-spacing:.04em;color:var(--ink-soft)}\n  .nav-links a:hover{color:var(--ink)}\n  .nav .btn{padding:11px 22px}\n  @media(max-width:860px){.nav-links{display:none}}\n\n  /* hero */\n  .hero{padding:70px 0 0}\n  .hero-top{display:grid;grid-template-columns:1fr 1fr;gap:50px;align-items:end;margin-bottom:46px}\n  .hero h1{font-size:clamp(40px,5.6vw,72px);font-weight:400}\n  .hero h1 em{font-style:italic;font-family:'Cormorant';color:var(--terra);font-weight:500}\n  .hero .sub{color:var(--ink-soft);font-size:17px;max-width:34ch;margin-top:10px}\n  .hero .right{text-align:right}\n  .hero .dates{font-family:'Cormorant';font-size:clamp(28px,4vw,46px);font-weight:500;line-height:1.1}\n  .hero .place{color:var(--ink-soft);font-size:15px;letter-spacing:.05em;margin-top:8px}\n  .hero-cta{display:flex;gap:14px;align-items:center;justify-content:flex-end;margin-top:24px}\n  .hero-img{aspect-ratio:21/9;border:1px solid var(--line-d);overflow:hidden}\n  .stat-bar{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line-d);border-top:0}\n  .stat{padding:24px;border-right:1px solid var(--line-d);text-align:center}\n  .stat:last-child{border-right:0}\n  .stat .n{font-family:'Cormorant';font-size:34px;font-weight:600;color:var(--sage-d)}\n  .stat .l{font-size:12px;color:var(--ink-soft);letter-spacing:.08em;text-transform:uppercase;font-family:'Cormorant';font-weight:600}\n  @media(max-width:860px){.hero-top{grid-template-columns:1fr;gap:24px}.hero .right{text-align:left}.hero-cta{justify-content:flex-start}.stat-bar{grid-template-columns:1fr 1fr}.stat:nth-child(2){border-right:0}}\n\n  section{padding:96px 0}\n  .sec-head{max-width:62ch;margin-bottom:54px}\n  .sec-head h2{font-size:clamp(28px,3.6vw,44px);margin:14px 0}\n  .sec-head p{color:var(--ink-soft);font-size:17px}\n  .rule{height:1px;background:var(--line);border:0}\n\n  /* value breakdown — the price justification */\n  .value{background:var(--paper);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}\n  .vb{display:grid;grid-template-columns:1.1fr .9fr;gap:60px;align-items:center}\n  .vb h2{font-size:clamp(28px,3.6vw,42px)}\n  .vb .lead{color:var(--ink-soft);font-size:17px;margin:18px 0 26px}\n  .breakdown{border:1px solid var(--line-d);background:var(--bg)}\n  .br{display:flex;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--line);font-size:15px}\n  .br .v{font-family:'Cormorant';font-weight:600;font-size:17px}\n  .br.sum{background:var(--ink);color:var(--paper);border-bottom:0}\n  .br.sum .v{color:var(--paper)}\n  .br.was{color:var(--ink-soft)}\n  .br.was .v{text-decoration:line-through;color:var(--ink-soft);font-weight:500}\n  .save{display:inline-block;background:var(--sage);color:#fff;font-size:12px;padding:2px 10px;border-radius:2px;letter-spacing:.04em;margin-left:8px;font-family:'Noto Sans KR'}\n  @media(max-width:860px){.vb{grid-template-columns:1fr;gap:34px}}\n\n  /* experience editorial */\n  .exp{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line-d);border:1px solid var(--line-d);margin-top:10px}\n  .exp .e{background:var(--bg);padding:34px 30px}\n  .exp .e .of{font-size:30px;color:var(--terra);font-weight:600}\n  .exp .e h3{font-size:21px;margin:6px 0 10px}\n  .exp .e p{color:var(--ink-soft);font-size:14px}\n  @media(max-width:860px){.exp{gri      <div class=\"lbl\"><div class=\"of\">Day 01<\u002Fdiv><div class=\"dd\">9.04 FRI<\u002Fdiv><\u002Fdiv>\n          <div class=\"items\">\n            <div class=\"pitem\"><span class=\"tm\">15:00<\u002Fspan><span class=\"nm\">입소 &amp; 사이트 세팅<small>스카웃 키트 · 수첩 지급<\u002Fsmall><\u002Fspan><\u002Fdiv>\n            <div class=\"pitem\"><span class=\"tm\">18:30<\u002Fspan><span class=\"nm\">웰컴 인디 라이브<small>오프닝 무대<\u002Fsmall><\u002Fspan><\u002Fdiv>\n            <div class=\"pitem\"><span class=\"tm\">21:00<\u002Fspan><span class=\"nm\">캠프파이어<small>별 보기 · 마시멜로<\u002Fsmall><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pday hl\">\n          <div class=\"lbl\"><div class=\"of\">Day 02<\u002Fdiv><div class=\"dd\">9.05 SAT<\u002Fdiv><\u002Fdiv>\n          <div class=\"items\">\n            <div class=\"pitem\"><span class=\"tm\">10:00<\u002Fspan><span class=\"nm\">반려동물 축제 개장<small>부스 · 체험 · 포토존<\u002Fsmall><\u002Fspan><\u002Fdiv>\n            <div class=\"pitem\"><span class=\"tm\">14:00<\u002Fspan><span class=\"nm\">미션 펫스카웃<small>미션 수행 · 배지 획득<\u002Fsmall><\u002Fspan><\u002Fdiv>\n            <div class=\"pitem\"><span class=\"tm\">19:30<\u002Fspan><span class=\"nm\">헤드라이너 공연<small>메인 인디밴드 무대<\u002Fsmall><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pday\">\n          <div class=\"lbl\"><div class=\"of\">Day 03<\u002Fdiv><div class=\"dd\">9.06 SUN<\u002Fdiv><\u002Fdiv>\n          <div class=\"items\">\n            <div class=\"pitem\"><span class=\"tm\">09:00<\u002Fspan><span class=\"nm\">아침 산책 클래스<small>트레이너 동행<\u002Fsmall><\u002Fspan><\u002Fdiv>\n            <div class=\"pitem\"><span class=\"tm\">11:00<\u002Fspan><span class=\"nm\">배지 수여식<small>스카웃 수첩 완성<\u002Fsmall><\u002Fspan><\u002Fdiv>\n            <div class=\"pitem\"><span class=\"tm\">12:00<\u002Fspan><span class=\"nm\">철수 &amp; 작별<small>기념 굿즈 증정<\u002Fsmall><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- BOOKING -->\n  <section class=\"book\" id=\"book\">\n    <div class=\"wrap\">\n      <div class=\"sec-head\">\n        <div class=\"eyebrow\">Reserve<\u002Fdiv>\n        <h2>원하는 사이트를 선택하세요.<\u002Fh2>\n        <p>전체 350 사이트 중 비어 있는 자리를 고르면 됩니다. 결제가 완료되는 즉시 해당 사이트는 마감되어, 다른 분이 예약할 수 없습니다.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"panel\">\n        <div class=\"map\">\n          <div class=\"map-top\">\n            <div class=\"zone-tabs\" id=\"zones\"><\u002Fdiv>\n            <div class=\"legend\"><span><i style=\"background:#fff\"><\u002Fi>예약 가능<\u002Fspan><span><i style=\"background:#E7E1D2\"><\u002Fi>마감<\u002Fspan><span><i style=\"background:var(--terra)\"><\u002Fi>선택<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"grid-sites\" id=\"sites\"><\u002Fdiv>\n          <p style=\"font-size:12px;color:var(--ink-soft);margin-top:14px\">＊ 실제 배치도 이미지가 업로드되면 이 영역에 구역별 실측 배치도가 들어갑니다.<\u002Fp>\n        <\u002Fdiv>\n        <aside class=\"summary\">\n          <h3>예약 요약<\u002Fh3>\n          <p class=\"sub\">선택한 사이트<\u002Fp>\n          <div class=\"sel\" id=\"sel\"><span class=\"chip empty\">사이트를 선택하세요<\u002Fspan><\u002Fdiv>\n          <div class=\"ln-row\"><span>2박 3일 사이트<\u002Fspan><span class=\"v\" id=\"cnt\">0 면<\u002Fspan><\u002Fdiv>\n          <div class=\"ln-row\"><span>올인클루시브 패스<\u002Fspan><span class=\"v\">포함<\u002Fspan><\u002Fdiv>\n          <div class=\"tot\"><span>총 결제금액<\u002Fspan><span class=\"a of\" id=\"amt\">₩0<\u002Fspan><\u002Fdiv>\n          <button class=\"btn\" onclick=\"alert('PG 간편결제 단계로 이동합니다 (데모)')\">간편결제로 예약 확정<\u002Fbutton>\n          <div class=\"pg\"><span>KakaoPay<\u002Fspan><span>NaverPay<\u002Fspan><span>카드<\u002Fspan><span>계좌이체<\u002Fspan><\u002Fdiv>\n        <\u002Faside>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FAQ -->\n  <section class=\"faq\" id=\"faq\">\n    <div class=\"wrap\">\n      <div class=\"sec-head\"><div class=\"eyebrow\">Information<\u002Fdiv><h2>예약 전 안내<\u002Fh2><\u002Fdiv>\n      <details open=\"\"><summary>한 사이트에 몇 명, 몇 마리까지 가능한가요?<span><\u002Fspan><\u002Fsummary><div class=\"ans\">사이트당 인원과 반려동물 마릿수 기준 안내가 들어갑니다. (운영안 확정 후 업데이트)<\u002Fdiv><\u002Fdetails>\n      <details><summary>결제하면 바로 그 사이트가 확정되나요?<span><\u002Fspan><\u002Fsummary><div class=\"ans\">네. 간편결제가 완료되는 즉시 해당 사이트는 마감 처리되어 다른 분이 예약할 수 없습니다.<\u002Fdiv><\u002Fdetails>\n      <details><summary>어떤 반려동물이 입장 가능한가요?<span><\u002Fspan><\u002Fsummary><div class=\"ans\">예방접종·목줄 등 기본 규정 안내가 들어갑니다.<\u002Fdiv><\u002Fdetails>\n      <details><summary>환불 규정이 어떻게 되나요?<span><\u002Fspan><\u002Fsummary><div class=\"ans\">행사일 기준 단계별 환불 규정이 들어갑니다.<\u002Fdiv><\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FINAL -->\n  <section class=\"final\">\n    <div class=\"wrap\">\n      <div class=\"of\">Sep 04—06, 2026<\u002Fdiv>\n      <h2>올가을, <em>가장 좋은 주말<\u002Fem>을<br>예약하세요.<\u002Fh2>\n      <p>자리는 350개 한정. 반려견과의 사흘을 지금 확정하세요.<\u002Fp>\n      <a href=\"#book\" class=\"btn\">사이트 예약하기<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fmain>\n\n<footer>\n  <div class=\"wrap foot-in\">\n    <div>\n      <div class=\"lg\"><span class=\"of\">PetScout<\u002Fspan> &amp; Camping Festival 2026<\u002Fdiv>\n      <div>고성 잼버리 캠핑장 · 2026.09.04—06<\u002Fdiv>\n      <div style=\"margin-top:10px;font-size:13px\">주최 · 강원도반려동물협회<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"line-height:2;font-size:13px\">\n      예약 안내 · 자주 묻는 질문 · 오시는 길<br>\n      문의 033-000-0000 · info@petscout.kr\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  const zones=['A','B','C','D','E','F','G'];const perZone=50;\n  const zoneEl=document.getElementById('zones'),sitesEl=document.getElementById('sites'),selEl=document.getElementById('sel');\n  const PRICE=220000;let active='A';const selected=new Set();\n  function isTaken(z,n){return ((z.charCodeAt(0)*7+n*13)%5)===0;}\n  zones.forEach((z,i)=>{const b=document.createElement('button');b.className='ztab'+(i===0?' on':'');b.textContent='Zone '+z;b.onclick=()=>{active=z;[...zoneEl.children].forEach(c=>c.classList.remove('on'));b.classList.add('on');render();};zoneEl.appendChild(b);});\n  function render(){sitesEl.innerHTML='';for(let n=1;n<=perZone;n++){const id=active+String(n).padStart(2,'0');const d=document.createElement('div');d.className='site';d.textContent=n;if(isTaken(active,n)){d.classList.add('taken');}else{if(selected.has(id))d.classList.add('sel');d.onclick=()=>{selected.has(id)?selected.delete(id):selected.add(id);render();updateCart();};}sitesEl.appendChild(d);}}\n  function updateCart(){const arr=[...selected];selEl.innerHTML=arr.length?arr.map(s=>`<span class=\"chip\">${s}<\u002Fspan>`).join(''):'<span class=\"chip empty\">사이트를 선택하세요<\u002Fspan>';document.getElementById('cnt').textContent=arr.length+' 면';document.getElementById('amt').textContent='₩'+(arr.length*PRICE).toLocaleString();}\n  render();updateCart();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
