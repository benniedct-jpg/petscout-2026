  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

별빛 아래 강아지랑 듣는 무대는 여기서만.<\u002Fp><\u002Fdiv>\n        <div class=\"v\"><div class=\"n lat\">02<\u002Fdiv><h3>미션 펫스카웃<\u002Fh3><p>곳곳의 미션을 깨고 배지를 모으는 우리 개 전용 보물찾기.<\u002Fp><\u002Fdiv>\n        <div class=\"v\"><div class=\"n lat\">03<\u002Fdiv><h3>토요일은 축제<\u002Fh3><p>부스·체험·포토존이 가득한 반려동물 축제가 통째로 포함.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- LINEUP -->\n  <section class=\"poster\" id=\"lineup\">\n    <div class=\"wrap\">\n      <div class=\"sec-head\"><div class=\"eyebrow\">Line-up &amp; Stage<\u002Fdiv><h2>밤마다 무대가 열려요.<\u002Fh2><p class=\"lead\">두 밤의 인디밴드 라인업. 순차 공개됩니다.<\u002Fp><\u002Fdiv>\n      <div class=\"acts\">\n        <div class=\"act\"><div style=\"display:flex;gap:18px;align-items:center\"><span class=\"num lat\">01<\u002Fspan><span class=\"nm\">밴드 ①<\u002Fspan><\u002Fdiv><span class=\"meta\">DAY 1 · 18:30<\u002Fspan><\u002Fdiv>\n        <div class=\"act\"><div style=\"display:flex;gap:18px;align-items:center\"><span class=\"num lat\">02<\u002Fspan><span class=\"nm\">밴드 ②<\u002Fspan><\u002Fdiv><span class=\"meta\">DAY 2 · 19:30<\u002Fspan><\u002Fdiv>\n        <div class=\"act\"><div style=\"display:flex;gap:18px;align-items:center\"><span class=\"num lat\">03<\u002Fspan><span class=\"nm\">밴드 ③ — coming soon<\u002Fspan><\u002Fdiv><span class=\"meta\">TBA<\u002Fspan><\u002Fdiv>\n        <div class=\"act\"><div style=\"display:flex;gap:18px;align-items:center\"><span class=\"num lat\">04<\u002Fspan><span class=\"nm\">반려동물 축제<\u002Fspan><\u002Fdiv><span class=\"meta\">SAT · ALL DAY<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"moments\">\n        <div class=\"pol\"><div class=\"ph\">PHOTO<\u002Fdiv><div class=\"cap\">캠프파이어 🔥<\u002Fdiv><\u002Fdiv>\n        <div class=\"pol\"><div class=\"ph\">PHOTO<\u002Fdiv><div class=\"cap\">미션 배지 🏅<\u002Fdiv><\u002Fdiv>\n        <div class=\"pol\"><div class=\"ph\">PHOTO<\u002Fdiv><div class=\"cap\">축제 부스 🎪<\u002Fdiv><\u002Fdiv>\n        <div class=\"pol\"><div class=\"ph\">PHOTO<\u002Fdiv><div class=\"cap\">댕댕 친구들 🐶<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PROGRAM -->\n  <section id=\"program\">\n    <div class=\"wrap\">\n      <div class=\"sec-head\"><div class=\"eyebrow\">3-Day Schedule<\u002Fdiv><h2>도착하면 쉴 틈이 없어요.<\u002Fh2><\u002Fdiv>\n      <div class=\"timeline\">\n        <div class=\"tcard\"><div class=\"h\"><span>DAY 1<\u002Fspan><span class=\"lat\">9.04<\u002Fspan><\u002Fdiv><ul><li><b>15:00<\u002Fb>입소 · 키트 지급<\u002Fli><li><b>18:30<\u002Fb>웰컴 인디 라이브<\u002Fli><li><b>21:00<\u002Fb>캠프파이어 🔥<\u002Fli><\u002Ful><\u002Fdiv>\n        <div class=\"tcard\"><div class=\"h\"><span>DAY 2<\u002Fspan><span class=\"lat\">9.05<\u002Fspan><\u002Fdiv><ul><li><b>10:00<\u002Fb>반려동물 축제 OPEN<\u002Fli><li><b>14:00<\u002Fb>미션 펫스카웃 🏅<\u002Fli><li><b>19:30<\u002Fb>헤드라이너 무대<\u002Fli><\u002Ful><\u002Fdiv>\n        <div class=\"tcard\"><div class=\"h\"><span>DAY 3<\u002Fspan><span class=\"lat\">9.06<\u002Fspan><\u002Fdiv><ul><li><b>09:00<\u002Fb>아침 산책 클래스<\u002Fli><li><b>11:00<\u002Fb>배지 수여식<\u002Fli><li><b>12:00<\u002Fb>철수 · 굿즈 증정<\u002Fli><\u002Ful><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- BOOKING -->\n  <section class=\"book\" id=\"book\">\n    <div class=\"wrap\">\n      <div class=\"sec-head\"><div class=\"eyebrow\">Pick your spot<\u002Fdiv><h2>지도에서 골라 바로 예약 🎟<\u002Fh2><p class=\"lead\">350 사이트 중 빈 자리를 선택하세요. 결제하면 그 자리는 바로 내 자리, 다른 사람은 예약 불가.<\u002Fp><\u002Fdiv>\n      <div class=\"ticket\">\n        <div class=\"map\">\n          <div class=\"map-top\">\n            <div class=\"zone-tabs\" id=\"zones\"><\u002Fdiv>\n            <div class=\"legend\"><span><i style=\"background:#fff\"><\u002Fi>가능<\u002Fspan><span><i style=\"background:#E6E1D4\"><\u002Fi>마감<\u002Fspan><span><i style=\"background:var(--coral)\"><\u002Fi>선택<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"grid-sites\" id=\"sites\"><\u002Fdiv>\n          <p style=\"font-size:12px;color:var(--ink-soft);margin-top:14px\">＊ 실제 배치도 업로드 시 구역별 실측 지도가 들어갑니다.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"stub\">\n          <h3>🎟 내 티켓<\u002Fh3>\n          <p class=\"sub\">선택한 사이트가 담겨요<\u002Fp>\n          <div class=\"sel\" id=\"sel\"><span class=\"chip empty\">사이트를 선택하세요<\u002Fspan><\u002Fdiv>\n          <div class=\"ln-row\"><span>2박3일 사이트<\u002Fspan><b id=\"cnt\">0면<\u002Fb><\u002Fdiv>\n          <div class=\"ln-row\"><span>올인원 패스<\u002Fspan><b>포함<\u002Fb><\u002Fdiv>\n          <div class=\"ln-row\"><span>굿즈 &amp; 배지<\u002Fspan><b>포함<\u002Fb><\u002Fdiv>\n          <div class=\"tot\"><span>합계<\u002Fspan><span class=\"a lat\" id=\"amt\">₩0<\u002Fspan><\u002Fdiv>\n          <button class=\"btn\" onclick=\"alert('PG 간편결제 단계로 이동합니다 (데모)')\">간편결제로 예약 확정 →<\u002Fbutton>\n          <div class=\"pg\"><span>KakaoPay<\u002Fspan><span>NaverPay<\u002Fspan><span>카드<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FAQ -->\n  <section class=\"faq\" id=\"faq\" style=\"padding-top:0\">\n    <div class=\"wrap\">\n      <div class=\"sec-head\"><div class=\"eyebrow\">Info<\u002Fdiv><h2>예약 전 체크 ✔<\u002Fh2><\u002Fdiv>\n      <details open=\"\"><summary>한 사이트에 몇 명·몇 마리?<span><\u002Fspan><\u002Fsummary><div class=\"ans\">사이트당 인원·반려동물 마릿수 안내가 들어갑니다.<\u002Fdiv><\u002Fdetails>\n      <details><summary>결제하면 바로 마감되나요?<span><\u002Fspan><\u002Fsummary><div class=\"ans\">네. 간편결제 완료 즉시 해당 사이트는 마감되어 다른 사람이 예약할 수 없습니다.<\u002Fdiv><\u002Fdetails>\n      <details><summary>어떤 반려동물이 가능?<span><\u002Fspan><\u002Fsummary><div class=\"ans\">예방접종·목줄 등 기본 규정 안내가 들어갑니다.<\u002Fdiv><\u002Fdetails>\n      <details><summary>환불 규정<span><\u002Fspan><\u002Fsummary><div class=\"ans\">행사일 기준 단계별 환불 규정이 들어갑니다.<\u002Fdiv><\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FINAL -->\n  <section class=\"final\">\n    <div class=\"wrap\">\n      <h2>올 여름,<br>최고의 주말 🐾<\u002Fh2>\n      <p>자리는 350개뿐. 우리 강아지의 첫 페스티벌을 놓치지 마세요.<\u002Fp>\n      <a href=\"#book\" class=\"btn ink lg\">지금 예약하기 →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fmain>\n\n<footer>\n  <div class=\"wrap foot-in\">\n    <div><div class=\"lg\">2026 코리아 펫스카웃 &amp; 캠핑 페스티벌<\u002Fdiv><div>고성 잼버리 캠핑장 · 2026.09.04–06<\u002Fdiv><div style=\"margin-top:10px\">주최 · 강원도반려동물협회<\u002Fdiv><\u002Fdiv>\n    <div style=\"line-height:2\">예약 안내 · 자주 묻는 질문 · 오시는 길<br>문의 033-000-0000 · info@petscout.kr<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  const zones=['A','B','C','D','E','F','G'];const perZone=50;\n  const zoneEl=document.getElementById('zones'),sitesEl=document.getElementById('sites'),selEl=document.getElementById('sel');\n  const PRICE=220000;let active='A';const selected=new Set();\n  function isTaken(z,n){return ((z.charCodeAt(0)*7+n*13)%5)===0;}\n  zones.forEach((z,i)=>{const b=document.createElement('button');b.className='ztab'+(i===0?' on':'');b.textContent='존 '+z;b.onclick=()=>{active=z;[...zoneEl.children].forEach(c=>c.classList.remove('on'));b.classList.add('on');render();};zoneEl.appendChild(b);});\n  function render(){sitesEl.innerHTML='';for(let n=1;n<=perZone;n++){const id=active+String(n).padStart(2,'0');const d=document.createElement('div');d.className='site';d.textContent=n;if(isTaken(active,n)){d.classList.add('taken');}else{if(selected.has(id))d.classList.add('sel');d.onclick=()=>{selected.has(id)?selected.delete(id):selected.add(id);render();updateCart();};}sitesEl.appendChild(d);}}\n  function updateCart(){const arr=[...selected];selEl.innerHTML=arr.length?arr.map(s=>`<span class=\"chip\">${s}<\u002Fspan>`).join(''):'<span class=\"chip empty\">사이트를 선택하세요<\u002Fspan>';document.getElementById('cnt').textContent=arr.length+'면';document.getElementById('amt').textContent='₩'+(arr.length*PRICE).toLocaleString();}\n  render();updateCart();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
