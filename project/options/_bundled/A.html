  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

low-x:hidden}\n  .wrap{max-width:1180px;margin:0 auto;padding:0 24px}\n  h1,h2,h3,.disp{font-family:'Black Han Sans','Noto Sans KR',sans-serif;font-weight:400;letter-spacing:-.01em;line-height:1.05}\n  .lat{font-family:'Anton',sans-serif;letter-spacing:.01em;text-transform:uppercase}\n  a{color:inherit;text-decoration:none}\n  .ph{background-color:#E6DCC6;background-image:repeating-linear-gradient(45deg,rgba(42,32,24,.06) 0 14px,rgba(42,32,24,0) 14px 28px);display:flex;align-items:center;justify-content:center;font-family:'Anton',monospace;font-size:13px;color:rgba(42,32,24,.45);letter-spacing:.12em;text-transform:uppercase;text-align:center;padding:16px}\n\n  /* badges */\n  .badge{display:inline-flex;align-items:center;gap:8px;border:2px solid var(--line);border-radius:999px;padding:7px 16px;font-weight:700;font-size:13px;background:var(--paper)}\n  .dot{width:10px;height:10px;border-radius:50%}\n\n  /* nav */\n  header.nav{position:sticky;top:0;z-index:50;background:rgba(244,237,221,.88);backdrop-filter:blur(8px);border-bottom:2px solid var(--line)}\n  .nav-in{display:flex;align-items:center;justify-content:space-between;height:68px}\n  .logo{display:flex;align-items:center;gap:11px;font-family:'Black Han Sans';font-size:18px}\n  .logo .seal{width:34px;height:34px;border-radius:50%;background:var(--forest);color:#fff;display:grid;place-items:center;font-family:'Anton';font-size:15px;border:2px solid var(--line)}\n  .nav-links{display:flex;gap:26px;font-size:14px;font-weight:500}\n  .nav-links a:hover{color:var(--orange)}\n  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:700;border:2px solid var(--line);border-radius:999px;padding:11px 22px;cursor:pointer;font-size:14px;transition:transform .12s ease,box-shadow .12s ease;background:var(--orange);color:#fff;box-shadow:3px 3px 0 var(--line)}\n  .btn:hover{transform:translate(-1px,-1px);box-shadow:5px 5px 0 var(--line)}\n  .btn.ghost{background:var(--paper);color:var(--ink)}\n  .btn.forest{background:var(--forest)}\n  .btn.lg{padding:16px 30px;font-size:16px}\n  @media(max-width:820px){.nav-links{display:none}}\n\n  /* hero */\n  .hero{position:relative;padding:54px 0 30px}\n  .hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:40px;align-items:center}\n  .kicker{display:inline-flex;align-items:center;gap:10px;font-family:'Anton';letter-spacing:.14em;font-size:13px;color:var(--forest-d);margin-bottom:18px}\n  .kicker::before{content:\"\";width:26px;height:3px;background:var(--orange)}\n  .hero h1{font-size:clamp(44px,7vw,84px)}\n  .hero h1 .o{color:var(--orange)}\n  .hero h1 .f{color:var(--forest)}\n  .hero-sub{font-size:18px;color:var(--ink-soft);margin:20px 0 8px;max-width:30ch}\n  .meta-row{display:flex;flex-wrap:wrap;gap:10px;margin:22px 0 26px}\n  .hero-cta{display:flex;gap:14px;flex-wrap:wrap;align-items:center}\n  .price-note{font-size:13px;color:var(--ink-soft)}\n  .hero-art{position:relative}\n  .hero-img{aspect-ratio:4/5;border-radius:var(--r);border:2px solid var(--line);overflow:hidden;box-shadow:8px 8px 0 var(--line)}\n  .float-badge{position:absolute;width:120px;height:120px;border-radius:50%;background:var(--paper);border:2px solid var(--line);display:grid;place-items:center;text-align:center;font-family:'Black Han Sans';font-size:14px;line-height:1.15;box-shadow:4px 4px 0 var(--line);transform:rotate(-8deg)}\n  .float-badge .big{font-family:'Anton';font-size:30px;color:var(--orange);display:block}\n  .fb1{top:-26px;right:-22px;background:var(--forest);color:#fff;transform:rotate(9deg)}\n  .fb1 .big{color:#fff}\n  .fb2{bottom:-24px;left:-26px}\n  @media(max-width:820px){.hero-grid{grid-template-columns:1fr;gap:54px}.fb1{right:6px}.fb2{left:6px}}\n\n  /* marquee */\n  .marq{border-top:2px solid var(--line);border-bottom:2px solid var(--line);background:var(--forest);color:#fff;overflow:hidden;padding:12px 0;margin-top:34px}\n  .marq-track{display:flex;gap:40px;white-space:nowrap;font-family:'Anton';font-size:20px;letter-spacing:.06em;animation:scroll 26s linear infinite}\n  .marq-track span{display:inline-flex;align-items:center;gap:40px}\n  .marq-track .s{color:var(--orange)}\n  @keyframes scroll{to{transform:translateX(-50%)}}\n\n  section{padding:84px 0}\n  .sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:44px;flex-wrap:wrap}\n  .sec-head h2{font-size:clamp(30px,4vw,48px)}\n  .eyebrow{font-family:'Anton';letter-spacing:.14em;font-size:13px;color:var(--orange-d);margin-bottom:10px}\n  .lead{max-width:46ch;color:var(--ink-soft);font-size:16px}\n\n  /* value */\n  .value{background:var(--paper);border-top:2px solid var(--line);border-bottom:2px solid var(--line)}\n  .value .big-claim{font-family:'Black Han Sans';font-size:clamp(26px,3.4vw,40px);line-height:1.2;max-width:18ch;margin-bottom:8px}\n  .value .big-claim em{font-style:normal;color:var(--orange);position:relative}\n  .vgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:40px}\n  .vcard{background:var(--bg);border:2px solid var(--line);border-radius:var(--r);padding:24px;box-shadow:5px 5px 0 var(--line);position:relative}\n  .vcard .num{font-family:'Anton';font-size:14px;color:var(--orange);letter-spacing:.1em}\n  .vcard h3{font-size:21px;margin:10px 0 8px}\n  .vcard p{font-size:14px;color:var(--ink-soft)}\n  .vcard .ico{width:46px;height:46px;border-radius:50%;border:2px solid var(--line);background:var(--forest);color:#fff;display:grid;place-items:center;font-family:'Anton';margin-bottom:14px}\n  @media(max-width:820px){.vgrid{grid-template-columns:1fr}}\n\n  /* program timeline */\n  .days{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}\n  .day{border:2px solid var(--line);border-radius:var(--r);overflow:hidden;background:var(--paper)}\n  .day-top{background:var(--ink);color:var(--paper);padding:18px 20px;display:flex;align-items:baseline;justify-content:space-between}\n  .day-top .d{font-family:'Anton';font-size:30px}\n  .day-top .dd{font-size:13px;opacity:.8}\n  .day-body{padding:8px 20px 22px}\n  .slot{display:flex;gap:14px;padding:14px 0;border-bottom:1px dashed rgba(42,32,24,.25)}\n  .slot:last-child{border-bottom:0}\n  .slot .t{font-family:'Anton';font-size:13px;color:var(--orange-d);min-width:52px;padding-top:2px}\n  .slot .n{font-weight:700;font-size:15px}\n  .slot .x{font-size:13px;color:var(--ink-soft)}\n  .day.fest .day-top{background:var(--orange)}\n  @media(max-width:820px){.days{grid-template-columns:1fr}}\n\n  /* lineup */\n  .lineup{background:var(--forest);color:var(--paper);border-top:2px solid var(--line);border-bottom:2px solid var(--line)}\n  .lineup .eyebrow{color:#F4D9B0}\n  .lineup .lead{color:rgba(251,246,234,.8)}\n  .ln-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}\n  .ln{border:2px solid rgba(251,246,234,.4);border-radius:var(--r);overflow:hidden;background:rgba(0,0,0,.12)}\n  .ln .ph{background-color:#3a7a5b;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.07) 0 14px,rgba(255,255,255,0) 14px 28px);aspect-ratio:1;color:rgba(255,255,255,.5)}\n  .ln .cap{padding:13px 15px}\n  .ln .cap .nm{font-family:'Black Han Sans';font-size:16px}\n  .ln .cap .tag{font-size:12px;color:#F4D9B0}\n  @media(max-width:820px){.ln-grid{grid-template-columns:1fr 1fr}}\n\n  /* sitemap booking */\n  .book .panel{display:grid;grid-template-columns:1.4fr .9fr;gap:24px;align-items:start}\n  .map{border:2px solid var(--line);border-radius:var(--r);background:var(--paper);padding:22px;box-shadow:5px 5px 0 var(--line)}\n  .map-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}\n  .zone-tabs{display:flex;gap:8px;flex-wrap:wrap}\n  .ztab{border:2px solid var(--line);background:var(--bg);border-radius:999px;padding:6px 14px;font-weight:700;font-size:13px;cursor:pointer;font-family:'Noto Sans KR'}\n  .ztab.on{background:var(--forest);color:#fff}\n  .legend{display:flex;gap:16px;font-size:12px;color:var(--ink-soft);flex-wrap:wrap}\n  .  결제에 다 들었어요.<\u002Fh2><\u002Fdiv><\u002Fdiv>\n      <div class=\"incl\">\n        <div><span class=\"ic lat\">STAY<\u002Fspan>2박 3일 캠핑 사이트<\u002Fdiv>\n        <div><span class=\"ic lat\">SHOW<\u002Fspan>인디밴드 공연 2회 + 캠프파이어<\u002Fdiv>\n        <div><span class=\"ic lat\">PLAY<\u002Fspan>미션 펫스카웃 + 반려동물 축제<\u002Fdiv>\n        <div><span class=\"ic lat\">GIFT<\u002Fspan>스카웃 키트 · 한정 배지 · 굿즈<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FAQ -->\n  <section class=\"faq\" id=\"faq\" style=\"padding-top:0\">\n    <div class=\"wrap\">\n      <div class=\"sec-head\"><div><div class=\"eyebrow lat\">Info<\u002Fdiv><h2>예약 전 확인하세요.<\u002Fh2><\u002Fdiv><\u002Fdiv>\n      <details open=\"\"><summary>한 사이트에 몇 명, 몇 마리까지 가능한가요?<span><\u002Fspan><\u002Fsummary><div class=\"ans\">사이트당 성인 기준 인원과 반려동물 마릿수 안내가 들어갑니다. (배치도/운영안 확정 후 업데이트)<\u002Fdiv><\u002Fdetails>\n      <details><summary>결제하면 바로 그 사이트가 제 자리가 되나요?<span><\u002Fspan><\u002Fsummary><div class=\"ans\">네. 간편결제가 완료되는 즉시 해당 사이트는 마감 처리되어 다른 사람이 예약할 수 없습니다.<\u002Fdiv><\u002Fdetails>\n      <details><summary>어떤 반려동물이 입장 가능한가요?<span><\u002Fspan><\u002Fsummary><div class=\"ans\">반려견 중심이며 예방접종·목줄 등 기본 규정 안내가 들어갑니다.<\u002Fdiv><\u002Fdetails>\n      <details><summary>환불 규정이 궁금해요.<span><\u002Fspan><\u002Fsummary><div class=\"ans\">행사일 기준 환불 단계별 규정이 들어갑니다.<\u002Fdiv><\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FINAL CTA -->\n  <section class=\"final\">\n    <div class=\"wrap\">\n      <h2>자리는 350개,<br>주말은 한 번뿐.<\u002Fh2>\n      <p>우리 개의 첫 스카웃 배지, 올해 9월 고성에서.<\u002Fp>\n      <a href=\"#book\" class=\"btn lg\">지금 사이트 예약 →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fmain>\n\n<footer>\n  <div class=\"wrap foot-in\">\n    <div>\n      <div class=\"lg\">2026 코리아 펫스카웃 &amp; 캠핑 페스티벌<\u002Fdiv>\n      <div>고성 잼버리 캠핑장 · 2026.09.04–06<\u002Fdiv>\n      <div style=\"margin-top:10px;font-size:13px\">주최 · 강원도반려동물협회<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-size:13px;line-height:2\">\n      <a href=\"#book\">예약 안내<\u002Fa> · <a href=\"#faq\">자주 묻는 질문<\u002Fa> · <a href=\"#\">오시는 길<\u002Fa><br>\n      문의 033-000-0000 · info@petscout.kr\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  // Zones + sample selectable site map (mock of 350-site booking)\n  const zones = ['A','B','C','D','E','F','G'];\n  const perZone = 50;\n  const zoneEl = document.getElementById('zones');\n  const sitesEl = document.getElementById('sites');\n  const selEl = document.getElementById('sel');\n  const PRICE = 220000;\n  let active = 'A';\n  const selected = new Set();\n  // deterministic \"taken\" set\n  function isTaken(z,n){ return ((z.charCodeAt(0)*7 + n*13) % 5) === 0; }\n\n  zones.forEach((z,i)=>{\n    const b=document.createElement('button');\n    b.className='ztab'+(i===0?' on':'');\n    b.textContent='존 '+z;\n    b.onclick=()=>{active=z;[...zoneEl.children].forEach(c=>c.classList.remove('on'));b.classList.add('on');render();};\n    zoneEl.appendChild(b);\n  });\n\n  function render(){\n    sitesEl.innerHTML='';\n    for(let n=1;n<=perZone;n++){\n      const id=active+String(n).padStart(2,'0');\n      const d=document.createElement('div');\n      d.className='site';\n      d.textContent=n;\n      if(isTaken(active,n)){d.classList.add('taken');}\n      else{\n        if(selected.has(id))d.classList.add('sel');\n        d.onclick=()=>{selected.has(id)?selected.delete(id):selected.add(id);render();updateCart();};\n      }\n      sitesEl.appendChild(d);\n    }\n  }\n  function updateCart(){\n    const arr=[...selected];\n    selEl.innerHTML = arr.length? arr.map(s=>`<span class=\"chip\">${s}<\u002Fspan>`).join('') : '<span class=\"chip empty\">사이트를 선택하세요<\u002Fspan>';\n    document.getElementById('cnt').textContent=arr.length+' 면';\n    document.getElementById('amt').textContent='₩'+(arr.length*PRICE).toLocaleString();\n  }\n  render();updateCart();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
